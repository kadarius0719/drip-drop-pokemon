  # ---- LIVE-CHECK TEMPLATES (disabled until product pages exist) ----------
  # Once a retailer publishes the preorder page, fill in the id and flip enabled: true.

  # Target: open the product page, copy the TCIN (the numeric id in the URL / page).
  - id: etb-30th-target
    name: "30th Celebration ETB — Target (live check)"
    retailer: "Target"
    source: target
    url: "https://www.target.com/"      # replace with the real product URL
    tcin: ""                             # <-- paste the TCIN here, then enable
    msrp_usd: 49.99
    release_date: "2026-09-16"
    enabled: false

  # Best Buy: needs bestbuy.api_key in settings.yaml + the product SKU.
  - id: etb-30th-bestbuy
    name: "30th Celebration ETB — Best Buy (live check)"
    retailer: "Best Buy"
    source: bestbuy
    url: "https://www.bestbuy.com/"      # replace with the real product URL
    sku: ""                              # <-- paste the Best Buy SKU here, then enable
    msrp_usd: 49.99
    release_date: "2026-09-16"
    enabled: false

  # Barnes & Noble: low bot protection — a polite page keyword check works here.
  - id: etb-30th-bn
    name: "30th Celebration ETB — Barnes & Noble (live check)"
    retailer: "Barnes & Noble"
    source: page
    url: "https://www.barnesandnoble.com/"   # replace with the real product URL
    msrp_usd: 49.99
    release_date: "2026-09-16"
