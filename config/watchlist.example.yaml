# PokeDrop watchlist — the Pokémon TCG "30th Celebration" line (global launch 2026-09-16).
# Copy to watchlist.yaml (via `python run.py init`) and tune.
#
# source:
#   reminder  -> no live scraping; date-based reminders only. Used for heavily
#                bot-protected retailers (Pokémon Center, Walmart, GameStop).
#   target    -> Target RedSky public API (needs `tcin`)
#   bestbuy   -> Best Buy developer API (needs `sku` + bestbuy.api_key in settings)
#   page      -> polite keyword check of a normal product page (low-bot sites, e.g. B&N)
#
# drop_time: set this to the actual PREORDER open datetime once a retailer announces
#   it (ISO8601 with timezone). Until then it's seeded to the confirmed street date
#   so you still get release-day reminders. Reminders fire at settings.reminders.
#
# TIP: as of the 2026-07-04 research, preorder pages / TCINs / SKUs were not yet
# published for most retailers. The reminder watches below work NOW. Fill in the
# `target` / `bestbuy` / `page` templates at the bottom once product pages go live.

